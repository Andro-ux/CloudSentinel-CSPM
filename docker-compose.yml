version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: deployment/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./cloudsentinel.db:/app/cloudsentinel.db
    depends_on:
      - redis

  celery_worker:
    build:
      context: .
      dockerfile: deployment/Dockerfile.backend
    command: celery -A backend.celery_worker.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./cloudsentinel.db:/app/cloudsentinel.db
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: ../deployment/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend


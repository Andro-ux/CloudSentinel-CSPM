services:
  postgres:
    image: postgres:16-alpine
    container_name: cloudsentinel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cloudsentinel
      POSTGRES_USER: cloudsentinel
      POSTGRES_PASSWORD: cloudsentinel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cloudsentinel

  redis:
    image: redis:7-alpine
    container_name: cloudsentinel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cloudsentinel

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: cloudsentinel-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://cloudsentinel:cloudsentinel@postgres:5432/cloudsentinel
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=dev-secret-key-change-in-production
      - ENVIRONMENT=development
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - LOG_FORMAT=text
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    volumes:
      - ./backend:/app/backend
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      - postgres
      - redis
    networks:
      - cloudsentinel

  worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    container_name: cloudsentinel-worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://cloudsentinel:cloudsentinel@postgres:5432/cloudsentinel
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=dev-secret-key-change-in-production
      - ENVIRONMENT=development
      - DEBUG=true
    volumes:
      - ./backend:/app/backend
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      - postgres
      - redis
    networks:
      - cloudsentinel

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: cloudsentinel-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - cloudsentinel

volumes:
  postgres_data:
  redis_data:

networks:
  cloudsentinel:
    driver: bridge

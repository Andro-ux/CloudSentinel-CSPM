services:
  postgres:
    image: postgres:16-alpine
    container_name: cloudsentinel-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cloudsentinel}
      POSTGRES_USER: ${POSTGRES_USER:-cloudsentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - cloudsentinel-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cloudsentinel}"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    container_name: cloudsentinel-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - cloudsentinel-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: cloudsentinel-backend
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cloudsentinel}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cloudsentinel}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=WARNING
      - LOG_FORMAT=json
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_RPM=60
      - CORS_ORIGINS=${CORS_ORIGINS:-}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cloudsentinel-internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    container_name: cloudsentinel-worker
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cloudsentinel}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cloudsentinel}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ENVIRONMENT=production
      - DEBUG=false
      - WORKER_ENABLED=true
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cloudsentinel-internal
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: cloudsentinel-frontend
    restart: always
    ports:
      - "127.0.0.1:80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cloudsentinel-internal
      - cloudsentinel-external
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  cloudsentinel-internal:
    driver: bridge
    internal: true
  cloudsentinel-external:
    driver: bridge
